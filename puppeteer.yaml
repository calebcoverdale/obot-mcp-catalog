name: Puppeteer
shortDescription: Browser automation with screenshots, navigation, and page interaction
description: |
  A Model Context Protocol (MCP) server that provides browser automation through Puppeteer. Enables AI agents to navigate web pages, take screenshots, click elements, fill forms, and extract content.

  ## Features
  - **Navigation**: Navigate to URLs and manage browser history
  - **Screenshots**: Capture full page or element-specific screenshots
  - **Interaction**: Click elements, fill forms, select options
  - **Content Extraction**: Extract text and HTML from pages
  - **JavaScript Execution**: Run arbitrary JavaScript in the browser context

  ## What you'll need to connect

  **No Setup Required**: Uses a bundled Chromium browser.
metadata:
  categories: Web, Automation
icon: https://img.icons8.com/?size=100&id=HFbdzBHkhONp&format=png&color=000000
repoURL: https://github.com/modelcontextprotocol/servers
env: []
toolPreview:
  - name: puppeteer_navigate
    description: Navigate to a URL in the browser
    params:
      url: URL to navigate to
  - name: puppeteer_screenshot
    description: Take a screenshot of the current page or a specific element
    params:
      name: Name for the screenshot
      selector: CSS selector for element to screenshot (optional)
      width: Viewport width (optional)
      height: Viewport height (optional)
  - name: puppeteer_click
    description: Click an element on the page
    params:
      selector: CSS selector for the element to click
  - name: puppeteer_fill
    description: Fill out an input field
    params:
      selector: CSS selector for the input field
      value: Value to fill in
  - name: puppeteer_evaluate
    description: Execute JavaScript in the browser console
    params:
      script: JavaScript code to execute
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/phat:main
  port: 8099
  path: /
  args:
    - mcp-server-puppeteer
